    <head>

        <link rel="stylesheet" href="../assets/css/global.css">
        <link rel="stylesheet" href="../assets/css/work.css">
        <link rel="icon" type="image/png" href="../assets/logos/logo.png">

    </head>

    <body>

        <header id="navbar">

            <nav class="nav-container">

                <div class="brand">
                    <span class="logo-text">LØWSET</span>
                </div>

                <div class="nav-right">

                    <div class="nav-links">
                        <a href="../home/index.html">Home</a>
                        <a href="../work/index.html">Work</a>
                        <a href="../films/index.html">Films</a>
                        <a href="../book/index.html">Book</a>
                        <a href="../godspeed/index.html">Godspeed</a>
                    </div>

                    <div class="hamburger" onclick="toggleMenu()">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>

                </div>

            </nav>

            <div id="mobileMenu" class="mobile-menu">
                <a href="../home/index.html">Home</a>
                <a href="../work/index.html">Work</a>
                <a href="../films/index.html">Films</a>
                <a href="../book/index.html">Book</a>
                <a href="../godspeed/index.html">Godspeed</a>
            </div>

        </header>

        <!-- HERO SECTION -->
        <section class="hero hero-small">

            <div class="hero-content">

                <h1>Work</h1>
                <p>
                    Explore our cinematic photography and video portfolio.
                </p>

            </div>

        </section>

        <!-- FILTER BUTTONS -->
        <section class="filter-section">

            <div class="filter-buttons">

                <button class="filter-button active" data-filter="all">All</button>
                <button class="filter-button active" data-filter="cars">Cars</button>
                <button class="filter-button active" data-filter="bikes">Bikes</button>
                <button class="filter-button active" data-filter="portraits">Portraits</button>
                <button class="filter-button active" data-filter="landscape">Landscape</button>
                <button class="filter-button active" data-filter="city">City</button>

            </div>

        </section>

        <!-- PORTFOLIO GRID -->
        <section class="portfolio-grid">

            <div class="portfolio-item" data-category="cars">
                <img src="../assets/images/work1.jpg" alt="">
                <div class="overlay"></div>
            </div>

        </section>

        <!-- CTA -->
         <section class="section cta">

            <h2>Work With Us</h2>
            <p>
                Want cinematic photos or videos for your project?
            </p>
            <a href="../book/index.html">Book a Shoot</a>

         </section>

        <footer>

            <p>
                © 2026 Godspeed Collective LLC ·
                <a href="../assets/policies/terms.html">Temrs of Service</a>
                <a href="../assets/policies/privacy.html">Privacy Policy</a>
            </p>

        </footer>

        <script>
            let lastScrollTop = 0;
            const navbar = document.getElementById("navbar");

            window.addEventListener("scroll", function () {
                let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                if (scrollTop > lastScrollTop) {
                    navbar.style.top = "-80px";
                }
                else {
                    navbar.style.top = "0";
                }
                lastScrollTop = scrollTop;
            });
        </script>

        <script src="../assets/js/main.js"></script>
        
    </body>

</html>
