<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LØWSET Media</title>
        <link rel="icon" type="image/png" href="../assets/logos/logo.png">
        <link rel="stylesheet" href="../assets/css/global.css">

        <link rel="stylesheet" href="../assets/css/work_categories.css">

        <script defer src="../assets/js/projects_loader.js"></script>

    </head>

    <body>

        <div data-include="../assets/components/navbar.html"></div>

        <main>

            <!-- HERO SECTION -->
            <section class="hero-small">

                <div class="hero-content">

                    <h1>Events</h1>

                </div>

            </section>

            <!-- FILTER BUTTONS -->
            <section class="filters">

                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="wedding">Weddings</button>
                <button class="filter-btn" data-filter="engagement">Engagements</button>
                <button class="filter-btn" data-filter="birthday">Birthdays</button>
                <button class="filter-btn" data-filter="anniversary">Anniversaries</button>
                <button class="filter-btn" data-filter="baby_shower">Baby Showers / Gender Reveals</button>
                <button class="filter-btn" data-filter="family">Family Reunions</button>
                <button class="filter-btn" data-filter="corporate">Corporate Parties</button>
                <button class="filter-btn" data-filter="seminar">Seminars / Workshops</button>
                <button class="filter-btn" data-filter="award">Award Cerimonies</button>
                <button class="filter-btn" data-filter="local_culture">Festivals / Fairs</button>
                <button class="filter-btn" data-filter="concert">Concerts / Performances</button>
                <button class="filter-btn" data-filter="sport">Sports</button>
                <button class="filter-btn" data-filter="fundraising">Charity / Fundraising</button>
                <button class="filter-btn" data-filter="graduation">Graduations</button>
                <button class="filter-btn" data-filter="kickback">Kickbacks / Casual Gatherings</button>
                
            </section>

            <!-- PROJECT GRID - JS FILLS THIS -->
            <section class="project-grid" id="projectGrid"></section>

        </main>

        <div data-include="../assets/components/footer.html"></div>

        <script src="../assets/js/include.js"></script>
        <script src="../assets/js/navScroll.js"></script>
        <script src="../assets/js/main.js"></script>
        
    </body>

</html>
